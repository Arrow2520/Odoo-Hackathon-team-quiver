<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pastel rough background blob -->
  <path d="M10,60 Q5,20 40,15 T100,30 Q115,70 90,105 T20,100 Q5,90 10,60" fill="#bfdbfe" opacity="0.6"/>
  
  <!-- Fill 1: Cargo Box -->
  <path d="M20,70 L22,35 L65,36 L64,72 Z" fill="#3b82f6" opacity="0.8"/>
  
  <!-- Fill 2: Cabin -->
  <path d="M65,45 L85,46 L95,60 L94,73 L64,72 Z" fill="#60a5fa" opacity="0.8"/>
  
  <!-- Window Fill -->
  <path d="M68,48 L82,49 L88,58 L68,57 Z" fill="#eff6ff" />

  <!-- Outlines (Grouped to apply a sketchy "filter" style or just multiple paths) -->
  <g stroke="#1e293b" fill="none">
    <!-- Cargo Box (double lined) -->
    <path d="M18,72 L20,33 L67,34 L66,74 Z" stroke-width="3" />
    <path d="M22,68 L24,37 L63,38 L62,70 Z" stroke-width="1.5" />
    
    <!-- Cabin (double lined) -->
    <path d="M67,43 L87,44 L97,58 L96,75 L66,74" stroke-width="3" />
    <path d="M63,47 L83,48 L93,62 L92,71 L62,70" stroke-width="1.5" />
    
    <!-- Window Outline -->
    <path d="M67,47 L81,48 L87,57 L67,56 Z" stroke-width="2" />
    <path d="M69,49 L79,50 L85,59 L69,58 Z" stroke-width="1" />
    
    <!-- Wheel Back -->
    <circle cx="35" cy="75" r="10" stroke-width="3" />
    <circle cx="36" cy="74" r="9" stroke-width="1.5" />
    <circle cx="35" cy="75" r="3" fill="#1e293b" />
    <circle cx="34" cy="76" r="3" fill="#1e293b" />
    
    <!-- Wheel Front -->
    <circle cx="75" cy="75" r="10" stroke-width="3" />
    <circle cx="74" cy="76" r="9" stroke-width="1.5" />
    <circle cx="75" cy="75" r="3" fill="#1e293b" />
    <circle cx="76" cy="74" r="3" fill="#1e293b" />
  </g>
</svg>